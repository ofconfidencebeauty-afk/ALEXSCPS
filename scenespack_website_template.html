<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALEXSCPS</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #1a2238, #05070f);
  color: white;
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
}

header h1 span {
  color:#5cc8ff;
}

/* HERO */
.hero {
  text-align:center;
  margin:60px 0;
}

.hero h2 {
  font-size:50px;
}

.hero h2 span {
  background: linear-gradient(90deg,#5cc8ff,#9b8cff);
  -webkit-background-clip:text;
  color:transparent;
}

.search input {
  padding:15px;
  width:320px;
  border-radius:30px;
  border:none;
  background:#111827;
  color:white;
  outline:none;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
  gap:20px;
  padding:40px;
}

.card {
  background:#111827;
  border-radius:15px;
  overflow:hidden;
  cursor:pointer;
  transition:.3s;
}

.card:hover {
  transform:scale(1.05);
}

.card img {
  width:100%;
  height:300px;
  object-fit:cover;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
}

.modal-content {
  background:#111827;
  margin:5% auto;
  padding:20px;
  width:350px;
  border-radius:10px;
}

button {
  padding:10px 15px;
  background:#5cc8ff;
  border:none;
  border-radius:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <h1>ALEX<span>SCPS</span></h1>
</header>

<section class="hero">
  <h2>Browse <span>Scenepacks</span></h2>
  <div class="search">
    <input type="text" id="search" placeholder="Search scenepack...">
  </div>
</section>

<section class="grid" id="grid"></section>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span id="close" style="float:right;cursor:pointer">✕</span>
    <img id="modal-img" style="width:100%">
    <h2 id="modal-title"></h2>
    <p id="modal-desc"></p>
    <button id="download">Download</button>
  </div>
</div>

<script>
const data = [
  {
    title:"Anyone But You",
    img:"https://picsum.photos/300/400?1",
    desc:"Romance / Comedy",
    link:"https://drive.google.com/"
  },
  {
    title:"Bullet Train",
    img:"https://picsum.photos/300/400?2",
    desc:"Action / Thriller",
    link:"https://drive.google.com/"
  },
  {
    title:"We Own This City",
    img:"https://picsum.photos/300/400?3",
    desc:"TV Show",
    link:"https://drive.google.com/"
  }
];

const grid = document.getElementById("grid");
const modal = document.getElementById("modal");

function render(list){
  grid.innerHTML="";
  list.forEach(item=>{
    const card = document.createElement("div");
    card.className="card";

    card.innerHTML = `<img src="${item.img}">`;

    card.onclick = ()=>{
      document.getElementById("modal-img").src=item.img;
      document.getElementById("modal-title").innerText=item.title;
      document.getElementById("modal-desc").innerText=item.desc;
      document.getElementById("download").onclick=()=>window.open(item.link);
      modal.style.display="block";
    }

    grid.appendChild(card);
  });
}

render(data);

/* SEARCH */
document.getElementById("search").addEventListener("input", e=>{
  const value = e.target.value.toLowerCase();
  const filtered = data.filter(i=>i.title.toLowerCase().includes(value));
  render(filtered);
});

/* CLOSE */
document.getElementById("close").onclick=()=>modal.style.display="none";

window.onclick = (e)=>{
  if(e.target==modal) modal.style.display="none";
}
</script>

</body>
</html>
